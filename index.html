<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영어공부">
<meta name="theme-color" content="#141720">
<title>My English Study</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#141720;--card:#1a1e2e;--border:#252a3d;--a1:#5b8dee;--a2:#f7c948;--a3:#3ecf8e;--a4:#f06595;--text:#e8eaf0;--muted:#6b7194;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}
  #splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.5s;}
  #splash.fade{opacity:0;pointer-events:none;}
  .sp-icon{font-size:54px;animation:pulse 1.2s ease infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .sp-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sp-sub{font-size:0.78rem;color:var(--muted);letter-spacing:0.08em;}
  .sp-bar{width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;}
  .sp-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:2px;animation:ld 1.3s ease forwards;}
  @keyframes ld{from{width:0}to{width:100%}}
  #installBanner{display:none;background:linear-gradient(135deg,#1a1e2e,#252a3d);border-bottom:1px solid var(--a1);padding:10px 16px;align-items:center;gap:10px;}
  #installBanner.show{display:flex;}
  .ib-icon{font-size:22px;flex-shrink:0;}
  .ib-text{flex:1;}
  .ib-text strong{display:block;font-size:0.82rem;color:var(--text);}
  .ib-text span{font-size:0.7rem;color:var(--muted);}
  .ib-btn{background:var(--a1);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:0.75rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
  .ib-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 4px;}
  #iosHint{display:none;background:#1a1e2e;border:1px solid var(--a1);border-radius:12px;margin:8px 14px;padding:10px 14px;font-size:0.75rem;color:var(--text);line-height:1.6;}
  #iosHint.show{display:block;}
  #iosHint strong{color:var(--a2);}
  .ios-x{float:right;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;margin-left:8px;}
  #offlineBadge{display:none;background:#f7c94820;border-bottom:1px solid var(--a2);padding:6px 16px;font-size:0.72rem;color:var(--a2);text-align:center;}
  #offlineBadge.show{display:block;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 11px;flex-shrink:0;}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .hdr-title{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:700;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hdr-date{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);}
  .prog-wrap{display:flex;align-items:center;gap:10px;}
  .prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:3px;transition:width 0.4s ease;}
  .prog-lbl{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--a3);font-weight:700;white-space:nowrap;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .tab{flex:1;padding:11px 8px;text-align:center;font-size:0.77rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none;}
  .tab.active{color:var(--a1);border-bottom-color:var(--a1);}
  .page{display:none;padding:16px 14px;overflow-y:auto;flex:1;}
  .page.active{display:block;}
  .plabel{font-family:'JetBrains Mono',monospace;font-size:0.63rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;}
  .scard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 15px 13px;position:relative;overflow:hidden;margin-bottom:11px;transition:transform .1s;}
  .scard:active{transform:scale(0.99);}
  .scard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ca);border-radius:14px 0 0 14px;}
  .scard.done{background:#1b2c1b;border-color:var(--a3);}
  .scard.done::before{background:var(--a3);}
  .c1{--ca:var(--a1);}.c2{--ca:var(--a2);}.c3{--ca:var(--a3);}.c4{--ca:var(--a4);}
  .cr1{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
  .cico{width:35px;height:35px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .cinf{flex:1;min-width:0;}
  .ctit{font-size:0.88rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .curl{font-size:0.66rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
  .ckbtn{width:31px;height:31px;flex-shrink:0;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
  .ckbtn.on{background:var(--a3);border-color:var(--a3);color:#fff;}
  .cr2{display:flex;gap:8px;}
  .obtn{flex:1;border-radius:9px;padding:8px;font-size:0.73rem;font-weight:600;text-align:center;text-decoration:none;display:block;font-family:'DM Sans',sans-serif;}
  .ebtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 12px;font-size:0.73rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-ttl{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;}
  .cnav{display:flex;gap:6px;}
  .cnav button{background:var(--card);border:1px solid var(--border);color:var(--text);width:29px;height:29px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:13px;}
  .lgit{display:flex;align-items:center;gap:5px;font-size:0.65rem;color:var(--muted);}
  .lgdot{width:9px;height:9px;border-radius:3px;}
  .crow{display:grid;grid-template-columns:46px 1fr;gap:9px;align-items:center;padding:6px 8px;border-radius:9px;margin-bottom:2px;border:1px solid transparent;}
  .crow.tdy{background:rgba(91,141,238,0.1);border-color:rgba(91,141,238,0.25);}
  .dnum{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:600;text-align:right;line-height:1;}
  .dnum.tdy{color:var(--a1);}.dnum.sun{color:#f87171;}.dnum.sat{color:var(--a1);}
  .dname{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;text-align:right;margin-top:1px;color:var(--muted);}
  .dname.sun{color:#f87171;}.dname.sat{color:var(--a1);}
  .dots{display:flex;gap:4px;align-items:center;}
  .dot{width:20px;height:20px;border-radius:5px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .dot.done{background:color-mix(in srgb,var(--dc) 28%,transparent);color:var(--dc);border:1px solid color-mix(in srgb,var(--dc) 45%,transparent);}
  .dot.undone{background:var(--card);color:var(--muted);border:1px solid var(--border);}
  .dot.future{opacity:0.2;background:var(--border);border:1px solid transparent;color:transparent;}
  .d1{--dc:var(--a1);}.d2{--dc:var(--a2);}.d3{--dc:var(--a3);}.d4{--dc:var(--a4);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .mbox{background:var(--card);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:20px 18px calc(28px + var(--safe-bot)) 18px;width:100%;transform:translateY(30px);transition:transform .25s;}
  .overlay.open .mbox{transform:translateY(0);}
  .mdrag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .mbox h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:16px;}
  .mbox label{display:block;font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
  .mbox input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;margin-bottom:12px;outline:none;transition:border-color .15s;}
  .mbox input:focus{border-color:var(--a1);}
  .mbtns{display:flex;gap:9px;margin-top:4px;}
  .bsave{flex:1;background:var(--a1);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .bcancel{flex:1;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:0.88rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  #toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(10px);background:var(--a3);color:#fff;padding:9px 22px;border-radius:30px;font-size:0.78rem;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;z-index:300;white-space:nowrap;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="splash"><div class="sp-icon">📖</div><div class="sp-title">My English Study</div><div class="sp-sub">하루 4가지 학습 루틴</div><div class="sp-bar"><div class="sp-fill"></div></div></div>
<div id="installBanner"><div class="ib-icon">📲</div><div class="ib-text"><strong>홈 화면에 추가</strong><span>앱처럼 빠르게 실행 가능</span></div><button class="ib-btn" id="installBtn">설치</button><button class="ib-x" id="installClose">✕</button></div>
<div id="iosHint"><button class="ios-x" id="iosClose">✕</button>📱 <strong>iPhone 홈 화면에 추가:</strong><br>Safari 하단 <strong>공유(□↑)</strong> → <strong>"홈 화면에 추가"</strong></div>
<div id="offlineBadge">📡 오프라인 모드 — 저장된 데이터로 실행 중</div>
<header>
  <div class="hdr-top"><div class="hdr-title">📖 My English Study</div><div class="hdr-date" id="hdrDate"></div></div>
  <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div><div class="prog-lbl" id="progLbl">0/4</div></div>
</header>
<div class="tabs">
  <div class="tab active" id="tab-study" onclick="sw('study')">📚 오늘 학습</div>
  <div class="tab" id="tab-calendar" onclick="sw('calendar')">📅 달력</div>
</div>
<div class="page active" id="page-study"><div class="plabel">오늘의 학습 루틴</div><div id="studyList"></div></div>
<div class="page" id="page-calendar">
  <div class="cal-hdr"><div class="cal-ttl" id="calTtl"></div><div class="cnav"><button onclick="chM(-1)">&#8249;</button><button onclick="chM(1)">&#8250;</button></div></div>
  <div class="legend" id="legend"></div>
  <div id="calList"></div>
</div>
<div class="overlay" id="overlay">
  <div class="mbox">
    <div class="mdrag"></div>
    <h3 id="mTtl">항목 편집</h3>
    <label>제목</label><input id="eTitle" type="text" placeholder="학습 항목 제목">
    <label>URL</label><input id="eUrl" type="url" inputmode="url" placeholder="https://...">
    <label>아이콘 이모지</label><input id="eIcon" type="text" maxlength="2" placeholder="🎧">
    <div class="mbtns"><button class="bcancel" onclick="closeMod()">취소</button><button class="bsave" onclick="saveMod()">저장</button></div>
  </div>
</div>
<div id="toast"></div>
<script>
const DEF=[{title:'해커스 AP News 받아쓰기',url:'https://www.hackers.co.kr',icon:'🎧'},{title:'TED-Ed 강의 1건 듣기',url:'https://ed.ted.com',icon:'🎬'},{title:'영어 말하기 연습',url:'https://www.google.com',icon:'🗣️'},{title:'Speak 영어 회화',url:'https://www.speak.com',icon:'💬'}];
const AC=['#5b8dee','#f7c948','#3ecf8e','#f06595'],AB=['①','②','③','④'],DK=['일','월','화','수','목','금','토'],ME=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
let items=ld('engPWA_items',DEF),logs=ld('engPWA_logs',{});
let cY,cM,eIdx=null;
const td=new Date();td.setHours(0,0,0,0);const TK=fmt(td);
function ld(k,def){try{return JSON.parse(localStorage.getItem(k))||def;}catch{return def;}}
function sv(){localStorage.setItem('engPWA_items',JSON.stringify(items));localStorage.setItem('engPWA_logs',JSON.stringify(logs));}
function fmt(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
window.addEventListener('load',()=>{
  if(!logs[TK])logs[TK]=[false,false,false,false];
  cY=td.getFullYear();cM=td.getMonth();
  document.getElementById('hdrDate').textContent=(td.getMonth()+1)+'.'+td.getDate()+' ('+DK[td.getDay()]+')';
  renderStudy();renderCal();buildLegend();
  setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('fade');setTimeout(()=>s.remove(),500);},1300);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  if(isIOS&&!isStandalone&&!localStorage.getItem('iosHintDone'))document.getElementById('iosHint').classList.add('show');
});
window.addEventListener('online',()=>document.getElementById('offlineBadge').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBadge').classList.add('show'));
if(!navigator.onLine)document.getElementById('offlineBadge').classList.add('show');
let dP=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;if(!localStorage.getItem('pwaDismissed'))document.getElementById('installBanner').classList.add('show');});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!dP)return;dP.prompt();const{outcome}=await dP.userChoice;if(outcome==='accepted')toast('🎉 홈 화면에 추가됐어요!');dP=null;document.getElementById('installBanner').classList.remove('show');});
document.getElementById('installClose').addEventListener('click',()=>{document.getElementById('installBanner').classList.remove('show');localStorage.setItem('pwaDismissed','1');});
document.getElementById('iosClose').addEventListener('click',()=>{document.getElementById('iosHint').classList.remove('show');localStorage.setItem('iosHintDone','1');});
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').classList.remove('show');toast('✅ 앱 설치 완료!');});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
function renderStudy(){
  const chk=logs[TK]||[false,false,false,false],done=chk.filter(Boolean).length;
  document.getElementById('progFill').style.width=done*25+'%';
  document.getElementById('progLbl').textContent=done+'/4';
  const list=document.getElementById('studyList');list.innerHTML='';
  items.forEach((item,i)=>{
    const d=chk[i],ac=AC[i],el=document.createElement('div');
    el.className='scard c'+(i+1)+(d?' done':'');
    el.innerHTML='<div class="cr1"><div class="cico" style="background:'+ac+'28">'+item.icon+'</div><div class="cinf"><div class="ctit">'+item.title+'</div><div class="curl">'+item.url+'</div></div><button class="ckbtn'+(d?' on':'')+'" onclick="tog('+i+')">'+(d?'✓':'')+'</button></div><div class="cr2"><a class="obtn" style="background:'+ac+'20;border:1px solid '+ac+'40;color:'+ac+'" href="'+item.url+'" target="_blank" rel="noopener">↗ 열기</a><button class="ebtn" onclick="openMod('+i+')">✏️ 편집</button></div>';
    list.appendChild(el);
  });
}
function tog(i){if(!logs[TK])logs[TK]=[false,false,false,false];logs[TK][i]=!logs[TK][i];sv();renderStudy();renderCal();toast(logs[TK][i]?'✅ 완료!':'↩ 해제');}
function sw(name){['study','calendar'].forEach(n=>{document.getElementById('tab-'+n).classList.toggle('active',n===name);document.getElementById('page-'+n).classList.toggle('active',n===name);});if(name==='calendar')setTimeout(()=>document.querySelector('.crow.tdy')?.scrollIntoView({block:'center',behavior:'smooth'}),80);}
function buildLegend(){const lg=document.getElementById('legend');AC.forEach((c,i)=>lg.innerHTML+='<div class="lgit"><div class="lgdot" style="background:'+c+'"></div>'+AB[i]+items[i].title.slice(0,4)+'</div>');}
function chM(d){cM+=d;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}renderCal();}
function renderCal(){
  document.getElementById('calTtl').textContent=cY+' · '+ME[cM];
  const list=document.getElementById('calList');list.innerHTML='';
  const days=new Date(cY,cM+1,0).getDate();
  for(let d=1;d<=days;d++){
    const date=new Date(cY,cM,d),key=fmt(date),dow=date.getDay();
    const isT=key===TK,isF=date>td,chk=logs[key]||[false,false,false,false];
    const dc=dow===0?'sun':dow===6?'sat':'';
    const row=document.createElement('div');row.className='crow'+(isT?' tdy':'');
    let dots='';for(let i=0;i<4;i++){const cl=isF?'future':chk[i]?'done':'undone';dots+='<div class="dot d'+(i+1)+' '+cl+'" title="'+(items[i]?.title||'')+'">'+AB[i]+'</div>';}
    row.innerHTML='<div><div class="dnum'+(isT?' tdy':'')+' '+dc+'">'+p2(d)+'</div><div class="dname '+dc+'">'+DK[dow]+'</div></div><div class="dots">'+dots+'</div>';
    list.appendChild(row);
  }
}
function openMod(i){eIdx=i;document.getElementById('eTitle').value=items[i].title;document.getElementById('eUrl').value=items[i].url;document.getElementById('eIcon').value=items[i].icon;document.getElementById('mTtl').textContent='항목 '+(i+1)+' 편집';document.getElementById('overlay').classList.add('open');}
function closeMod(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeMod();});
function saveMod(){if(eIdx===null)return;items[eIdx].title=document.getElementById('eTitle').value||items[eIdx].title;items[eIdx].url=document.getElementById('eUrl').value||items[eIdx].url;items[eIdx].icon=document.getElementById('eIcon').value||items[eIdx].icon;sv();closeMod();renderStudy();toast('💾 저장 완료!');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
</body>
</html>
